<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSC Portal | Deep Gradient Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-sky: #7dd3fc;
            --color-blue: #2563eb;
            --color-navy: #1e3a8a;
            --color-purple: #4c1d95;
        }
        body { 
            font-family: 'Anuphan', sans-serif;
            background: linear-gradient(180deg, var(--color-sky) 0%, var(--color-blue) 35%, var(--color-navy) 70%, var(--color-purple) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .btn-ios {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-ios:active { transform: scale(0.95); opacity: 0.8; }
        
        /* Cloud Warp Effect */
        #cloud-warp {
            position: fixed;
            top: 0;
            left: -150%;
            width: 150%;
            height: 100%;
            background: radial-gradient(circle, #fff 0%, #f0f9ff 50%, rgba(255,255,255,0) 100%);
            filter: blur(60px);
            z-index: 9999;
            pointer-events: none;
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .warp-active #cloud-warp {
            transform: translateX(200%);
        }

        .hidden-step { display: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="cloud-warp"></div>

    <div id="step-google" class="glass-panel p-10 rounded-[3rem] text-center max-w-sm w-full animate-fade-in">
        <div class="w-24 h-24 bg-white/20 mx-auto mb-6 rounded-3xl flex items-center justify-center text-4xl shadow-2xl">☁️</div>
        <h1 class="text-3xl font-bold mb-2">NSC Cloud</h1>
        <p class="text-white/60 mb-8 text-xs uppercase tracking-widest">Sign in with Google</p>
        
        <div class="flex justify-center">
            <div id="g_id_onload"
                 data-client_id="802485672001-7tuhmifm1ph2mb09hle6r6hf0tahu9gv.apps.googleusercontent.com"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large"></div>
        </div>
    </div>

    <div id="step-password" class="hidden-step glass-panel p-10 rounded-[3rem] text-center max-w-sm w-full">
        <div class="w-20 h-20 bg-sky-400/30 mx-auto mb-6 rounded-3xl flex items-center justify-center text-3xl">🔒</div>
        <h1 class="text-3xl font-bold mb-2">Verification</h1>
        <p class="text-white/60 mb-8 text-xs uppercase tracking-widest">Enter Access Code</p>
        
        <input type="password" id="entry-pin" placeholder="••••" 
               class="w-full bg-white/10 border border-white/20 rounded-2xl p-4 text-center text-2xl tracking-widest mb-6 focus:outline-none focus:ring-2 focus:ring-sky-400 text-white placeholder-white/30">
        
        <button onclick="checkAccess()" class="w-full py-4 bg-white text-blue-700 rounded-2xl font-black text-lg btn-ios shadow-lg">
            VERIFY & WARP
        </button>
        <p id="error-msg" class="mt-4 text-red-300 text-sm font-medium h-5"></p>
    </div>

    <script>
        const CORRECT_PIN = "NTUN2026";
        const TARGET_URL = "https://hero733.github.io/Nsc-/";
        let userEmail = "guest"; // จะถูกเขียนทับด้วย email จาก Google

        // 1. จัดการเมื่อ Google Login สำเร็จ
        function handleGoogleLogin(response) {
            // ถอดรหัส JWT เบื้องต้น (เพื่อให้ได้ email มาใช้ทำระบบล็อค)
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;

            // สลับหน้าจอ
            document.getElementById('step-google').classList.add('hidden-step');
            document.getElementById('step-password').classList.remove('hidden-step');
        }

        // 2. ตรวจสอบการเข้าถึง
        function checkAccess() {
            const inputPin = document.getElementById('entry-pin').value;
            const errorMsg = document.getElementById('error-msg');
            const now = new Date().getTime();

            // คีย์สำหรับเก็บข้อมูลแยกตามอีเมล
            const lockKey = userEmail + "_lockUntil";
            const attemptKey = userEmail + "_attempts";

            // เช็คสถานะการล็อค 1 วัน
            const lockUntil = localStorage.getItem(lockKey);
            if (lockUntil && now < parseInt(lockUntil)) {
                const remaining = new Date(parseInt(lockUntil));
                errorMsg.innerText = "ถูกล็อคชั่วคราว ลองใหม่พรุ่งนี้";
                return;
            }

            if (inputPin === CORRECT_PIN) {
                // ถ้าถูก: เคลียร์ประวัติ และเริ่มวาร์ป
                localStorage.removeItem(attemptKey);
                localStorage.removeItem(lockKey);
                errorMsg.className = "mt-4 text-emerald-300 text-sm font-medium";
                errorMsg.innerText = "ACCESS GRANTED. WARPING...";
                
                triggerCloudWarp();
            } else {
                // ถ้าผิด: นับจำนวนครั้ง
                let attempts = parseInt(localStorage.getItem(attemptKey) || "0") + 1;
                
                if (attempts >= 5) {
                    const oneDay = 24 * 60 * 60 * 1000;
                    localStorage.setItem(lockKey, now + oneDay);
                    localStorage.removeItem(attemptKey);
                    errorMsg.innerText = "ผิดครบ 5 ครั้ง ระบบถูกล็อค 1 วัน";
                } else {
                    localStorage.setItem(attemptKey, attempts);
                    errorMsg.innerText = `รหัสผิด! เหลือโอกาสอีก ${5 - attempts} ครั้ง`;
                    // สั่นช่อง input แบบ iOS
                    const inputField = document.getElementById('entry-pin');
                    inputField.classList.add('translate-x-1');
                    setTimeout(() => inputField.classList.remove('translate-x-1'), 100);
                }
            }
        }

        // 3. แอนิเมชั่นเมฆวาร์ป
        function triggerCloudWarp() {
            document.body.classList.add('warp-active');
            
            // รอให้เมฆเลื่อนมาบังจอ (ประมาณ 0.7-0.8 วินาที) แล้วเปลี่ยนหน้า
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 850);
        }
    </script>
</body>
</html>
