<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSC Portal | Ultimate Warp Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-sky: #7dd3fc;
            --color-blue: #2563eb;
            --color-navy: #1e3a8a;
            --color-purple: #4c1d95;
        }
        body { 
            font-family: 'Anuphan', sans-serif;
            background: linear-gradient(180deg, var(--color-sky) 0%, var(--color-blue) 35%, var(--color-navy) 70%, var(--color-purple) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            overflow: hidden;
            perspective: 1000px; /* สำหรับมิติความลึก */
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-ios {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-ios:active { transform: scale(0.92); opacity: 0.8; }

        /* การเปลี่ยนหน้าระหว่าง Card */
        .step-container {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .hidden-step {
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            pointer-events: none;
        }

        .active-step {
            opacity: 1;
            transform: translateY(0) scale(1);
            z-index: 10;
        }

        /* เอฟเฟกต์ Warp แสงทะลุมิติ */
        #warp-effect {
            position: fixed;
            inset: -50%;
            background: radial-gradient(circle, #ffffff 0%, #7dd3fc 40%, transparent 80%);
            opacity: 0;
            transform: scale(0.1);
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body.warping #warp-effect {
            opacity: 1;
            transform: scale(3);
        }

        body.warping .glass-panel {
            transform: translateZ(300px) scale(1.2);
            opacity: 0;
            filter: blur(20px);
        }

        /* อนิเมชั่นสั่นเมื่อรหัสผิด */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="warp-effect"></div>

    <div id="step-google" class="step-container active-step">
        <div class="glass-panel p-10 rounded-[3rem] text-center max-w-sm w-full">
            <div class="w-24 h-24 bg-white/20 mx-auto mb-6 rounded-3xl flex items-center justify-center text-4xl shadow-2xl relative overflow-hidden">
                <span class="relative z-10">🌍</span>
                <div class="absolute inset-0 bg-gradient-to-tr from-sky-400/20 to-transparent"></div>
            </div>
            <h1 class="text-3xl font-bold mb-2">NSC Portal</h1>
            <p class="text-white/60 mb-8 text-xs uppercase tracking-widest">Secure Authentication</p>
            
            <div class="flex justify-center mb-4">
                <div id="g_id_onload"
                     data-client_id="802485672001-7tuhmifm1ph2mb09hle6r6hf0tahu9gv.apps.googleusercontent.com"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large"></div>
            </div>
            
            <button onclick="mockGoogleLogin()" class="mt-4 text-xs text-white/40 underline hover:text-white transition">
                [ทดสอบ] ข้ามการล็อกอิน Google
            </button>
        </div>
    </div>

    <div id="step-password" class="step-container hidden-step">
        <div class="glass-panel p-10 rounded-[3rem] text-center max-w-sm w-full" id="password-card">
            <div class="w-20 h-20 bg-sky-400/30 mx-auto mb-6 rounded-3xl flex items-center justify-center text-3xl shadow-inner">
                🔒
            </div>
            <h1 class="text-3xl font-bold mb-2">Verification</h1>
            <p id="user-display" class="text-white/60 mb-8 text-xs font-medium tracking-wide">user@gmail.com</p>
            
            <input type="password" id="entry-pin" placeholder="••••••••" 
                   class="w-full bg-black/20 border border-white/20 rounded-2xl p-4 text-center text-2xl tracking-[0.3em] mb-6 focus:outline-none focus:ring-2 focus:ring-sky-400 text-white placeholder-white/20 backdrop-blur-md transition-all">
            
            <button onclick="checkAccess()" class="w-full py-4 bg-white text-blue-700 rounded-2xl font-black text-lg btn-ios shadow-[0_10px_20px_rgba(255,255,255,0.2)]">
                INITIATE WARP
            </button>
            <p id="error-msg" class="mt-4 text-red-300 text-sm font-medium h-5 transition-opacity"></p>
        </div>
    </div>

    <script>
        const CORRECT_PIN = "NTUN2026";
        const TARGET_URL = "https://hero733.github.io/Nsc-/";
        let userEmail = ""; 

        // 1. Google Login (ใช้งานจริง)
        function handleGoogleLogin(response) {
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                userEmail = payload.email;
                switchToPasswordStep();
            } catch (error) {
                console.error("Auth Error", error);
            }
        }

        // 1.5. จำลองข้าม Google
        function mockGoogleLogin() {
            userEmail = "test_developer@gmail.com"; 
            switchToPasswordStep();
        }

        // สลับหน้าจอแบบสมูท
        function switchToPasswordStep() {
            document.getElementById('user-display').innerText = `Logged in as: ${userEmail}`;
            
            const step1 = document.getElementById('step-google');
            const step2 = document.getElementById('step-password');
            
            step1.classList.remove('active-step');
            step1.classList.add('hidden-step');
            
            setTimeout(() => {
                step2.classList.remove('hidden-step');
                step2.classList.add('active-step');
                document.getElementById('entry-pin').focus();
            }, 300);
        }

        // 2. เช็ครหัสผ่านและล็อคอีเมล
        function checkAccess() {
            const inputPin = document.getElementById('entry-pin').value;
            const errorMsg = document.getElementById('error-msg');
            const card = document.getElementById('password-card');
            const now = new Date().getTime();

            // คีย์สำหรับล็อคเฉพาะอีเมลนั้นๆ
            const lockKey = userEmail + "_lockUntil";
            const attemptKey = userEmail + "_attempts";

            // เช็คว่าอีเมลนี้โดนแบนอยู่หรือไม่
            const lockUntil = localStorage.getItem(lockKey);
            if (lockUntil && now < parseInt(lockUntil)) {
                triggerError(card, errorMsg, "อีเมลนี้ถูกล็อคชั่วคราว ลองใหม่พรุ่งนี้");
                return;
            }

            // ถ้ารหัสถูกต้อง
            if (inputPin === CORRECT_PIN) {
                localStorage.removeItem(attemptKey);
                localStorage.removeItem(lockKey);
                errorMsg.style.color = "#6ee7b7"; // emerald-300
                errorMsg.innerText = "ACCESS GRANTED. HYPER-JUMP INITIATED...";
                
                triggerEpicWarp();
            } else {
                // ถ้ารหัสผิด
                let attempts = parseInt(localStorage.getItem(attemptKey) || "0") + 1;
                
                if (attempts >= 5) {
                    const oneDay = 24 * 60 * 60 * 1000;
                    localStorage.setItem(lockKey, now + oneDay);
                    localStorage.removeItem(attemptKey);
                    triggerError(card, errorMsg, "ผิดครบ 5 ครั้ง อีเมลถูกล็อค 1 วัน");
                } else {
                    localStorage.setItem(attemptKey, attempts);
                    triggerError(card, errorMsg, `รหัสผิด! เหลือโอกาสอีก ${5 - attempts} ครั้ง`);
                }
            }
        }

        // ทำให้กล่องสั่นเวลาใส่รหัสผิด
        function triggerError(cardElement, msgElement, text) {
            msgElement.style.color = "#fca5a5"; // red-300
            msgElement.innerText = text;
            cardElement.classList.remove('shake-animation');
            void cardElement.offsetWidth; // Trigger reflow
            cardElement.classList.add('shake-animation');
            document.getElementById('entry-pin').value = '';
        }

        // 3. แอนิเมชั่นทะลุมิติแบบสุดยอด
        function triggerEpicWarp() {
            // ซ่อนคีย์บอร์ดมือถือ
            document.getElementById('entry-pin').blur(); 
            
            // เพิ่ม class เพื่อเล่นแอนิเมชั่น
            document.body.classList.add('warping');
            
            // วาร์ปไปเว็บจริงหลังจากเล่นแอนิเมชั่นเสร็จ (1 วินาที)
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 1000);
        }
    </script>
</body>
</html>
