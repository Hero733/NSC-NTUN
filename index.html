<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 15px;
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>เข้าสู่ระบบ</h2>
    <input type="email" id="emailInput" placeholder="กรอกอีเมลของคุณ" required>
    <input type="password" id="passwordInput" placeholder="กรอกรหัสผ่าน" required>
    <button onclick="checkLogin()">Login</button>
    <div id="message"></div>
</div>

<script>
    // ตั้งค่ารหัสผ่านที่ถูกต้องไว้ที่นี่ (คำเตือน: ในระบบจริงห้ามเขียนรหัสผ่านไว้ในฝั่ง Client เด็ดขาด)
    const CORRECT_PASSWORD = "mypassword123"; 

    function checkLogin() {
        const email = document.getElementById("emailInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const messageDiv = document.getElementById("message");

        if (!email || !password) {
            messageDiv.textContent = "กรุณากรอกอีเมลและรหัสผ่านให้ครบถ้วน";
            return;
        }

        // คีย์สำหรับเก็บข้อมูลใน localStorage แยกตามอีเมล
        const attemptsKey = email + "_attempts";
        const lockTimeKey = email + "_lockUntil";

        const now = new Date().getTime();
        const lockUntil = localStorage.getItem(lockTimeKey);

        // 1. ตรวจสอบว่าอีเมลนี้ถูกล็อคอยู่หรือไม่
        if (lockUntil && now < parseInt(lockUntil)) {
            const unlockDate = new Date(parseInt(lockUntil));
            messageDiv.textContent = `อีเมลนี้ถูกระงับการใช้งานชั่วคราว กรุณาลองใหม่ในวันที่ ${unlockDate.toLocaleString()}`;
            return;
        }

        // 2. กรณีที่รหัสผ่าน "ถูกต้อง"
        if (password === CORRECT_PASSWORD) {
            // เคลียร์ประวัติการกรอกผิด
            localStorage.removeItem(attemptsKey);
            localStorage.removeItem(lockTimeKey);
            messageDiv.style.color = "green";
            messageDiv.textContent = "เข้าสู่ระบบสำเร็จ! กำลังเปลี่ยนหน้า...";
            
            // เปลี่ยนหน้าไปยังเว็บที่ต้องการ
            setTimeout(() => {
                window.location.href = "https://hero733.github.io/Nsc-/";
            }, 1000);
            return;
        }

        // 3. กรณีที่รหัสผ่าน "ผิด"
        let attempts = parseInt(localStorage.getItem(attemptsKey) || "0");
        attempts++;

        if (attempts >= 5) {
            // หากผิดครบ 5 ครั้ง ให้ล็อค 1 วัน (24 ชั่วโมง * 60 นาที * 60 วินาที * 1000 มิลลิวินาที)
            const oneDayInMilliseconds = 24 * 60 * 60 * 1000;
            const unlockTime = now + oneDayInMilliseconds;
            
            localStorage.setItem(lockTimeKey, unlockTime);
            localStorage.removeItem(attemptsKey); // รีเซ็ตตัวนับ
            
            messageDiv.textContent = "คุณกรอกรหัสผ่านผิดครบ 5 ครั้ง บัญชีนี้ถูกล็อคเป็นเวลา 1 วัน";
        } else {
            // บันทึกจำนวนครั้งที่ผิด และแจ้งเตือน
            localStorage.setItem(attemptsKey, attempts);
            messageDiv.textContent = `รหัสผ่านไม่ถูกต้อง! (คุณเหลือโอกาสอีก ${5 - attempts} ครั้ง)`;
        }
    }
</script>

</body>
</html>
